services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: insurtech-db
    environment:
      - 'POSTGRES_DB=insurtech_db'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: